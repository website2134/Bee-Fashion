<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bee Fashion</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            background: #0d0d0d;
            color: #fff;
        }

        /* SECTION */
        .contact-section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* HEADER */
        .contact-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .contact-header h2 {
            font-size: 36px;
        }

        .contact-header span {
            color: #ff0080;
        }

        .contact-header p {
            color: #aaa;
            font-size: 14px;
        }

        /* GRID */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* CARD */
        .contact-info,
        .contact-form,
        .map-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
        }

        /* INFO */
        .contact-info h3 {
            margin-bottom: 10px;
        }

        .contact-info p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 6px;
        }

        /* FORM */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #fff;
            font-size: 14px;
        }

        .contact-form button {
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #ff0080;
            color: #fff;
            cursor: pointer;
            transition: .3s;
        }

        .contact-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px #ff0080;
        }

        #msg {
            font-size: 12px;
            color: #0f0;
        }

        /* MAP */
        .map-box iframe {
            width: 100%;
            height: 260px;
            border: none;
            border-radius: 10px;
        }

        /* FLOAT BUTTONS */
        .whatsapp-btn,
        .call-btn {
            position: fixed;
            right: 10px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .3);
            z-index: 1000;
        }

        /* WhatsApp */
        .whatsapp-btn {
            background: #25D366;
            bottom: 80px;
        }

        /* Call */
        .call-btn {
            background: #ff0080;
            bottom: 20px;
        }

        /* HOVER */
        .whatsapp-btn:hover,
        .call-btn:hover {
            transform: scale(1.1);
        }

        /* MOBILE */
        @media(max-width:480px) {

            .contact-header h2 {
                font-size: 24px;
            }

            .contact-header p {
                font-size: 12px;
            }

            .contact-section {
                padding: 60px 15px;
            }

            .contact-container {
                grid-template-columns: 1fr;
            }

            .map-box iframe {
                height: 220px;
            }

        }
    </style>
</head>

<body>

    <section class="contact-section">

        <div class="contact-header">
            <h2>Contact <span>Bee Fashion</span></h2>
            <p>We are here to help you 24/7</p>
        </div>

        <div class="contact-container">

            <!-- INFO -->
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p>📍 Shop no34 bastipur more dehri on sone rohtas bihar 821307 </p>
                <p>📞 +91 9031233509</p>
                <p>✉ beefashion@gmail.com</p>
            </div>

            <!-- FORM -->
            <form class="contact-form" id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="4" placeholder="Message" required></textarea>
                <button type="submit">Send Message</button>
                <small id="msg"></small>
            </form>

            <!-- MAP -->
            <div class="map-box">
                <iframe src="https://www.google.com/maps?q=Mithapur%20Bihar&output=embed"></iframe>
            </div>

        </div>

    </section>

    <!-- FLOAT BUTTONS -->
    <a href="https://wa.me/9031233509" class="whatsapp-btn">💬</a>
    <a href="tel:+9031233509" class="call-btn">📞</a>

    <script>

        const form = document.getElementById("contactForm");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            msg.innerText = "Sending...";

            setTimeout(() => {
                msg.innerText = "Message Sent Successfully ✅";
                form.reset();
            }, 1500);

        });

    </script>

</body>

</html>
